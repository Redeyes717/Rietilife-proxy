<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>RietiLife</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Jost',Arial,sans-serif;background:#f5f0e8;min-height:100vh}
header{background:#0f0f0f;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 9px;border-bottom:2px solid #C8102E}
.logo{cursor:pointer}.logo img{height:34px;width:auto;display:block}
.hdate{font-size:10px;color:#666;font-style:italic}
.cats{display:flex;overflow-x:auto;scrollbar-width:none;gap:6px;padding:9px 14px}
.cats::-webkit-scrollbar{display:none}
.cat{background:#1e1e1e;border:0.5px solid #333;color:#888;font-family:inherit;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;padding:5px 13px;cursor:pointer;white-space:nowrap;border-radius:20px;transition:background .2s,color .2s;flex-shrink:0}
.cat:hover{color:#fff;background:#2a2a2a}
.cat.active{color:#fff;background:#C8102E;border-color:#C8102E}
#feed{max-width:480px;margin:0 auto;padding-bottom:90px}
.loader{text-align:center;padding:80px 20px}
.dots{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.dot{width:9px;height:9px;border-radius:50%;background:#C8102E;animation:bounce 1s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-10px);opacity:1}}
.loader p{color:#6b6560;font-style:italic;font-size:14px}
.featured{position:relative;overflow:hidden;cursor:pointer;background:#111;min-height:200px}
.featured img{width:100%;height:260px;object-fit:cover;display:block;opacity:.75;transition:opacity .3s,transform .4s}
.featured:hover img{opacity:.85;transform:scale(1.02)}
.feat-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px 18px 18px;background:linear-gradient(transparent,rgba(0,0,0,.92))}
.feat-cat{display:inline-block;background:#C8102E;color:#fff;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;margin-bottom:9px}
.feat-title{font-size:20px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.3px}
.feat-date{margin-top:8px;font-size:11px;color:rgba(255,255,255,.5);font-style:italic}
.divider{background:#f5f0e8;padding:11px 18px 5px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#6b6560;border-bottom:1px solid #d4cfc7;font-weight:600;display:flex;align-items:center;gap:10px}
.divider::after{content:'';flex:1;height:1px;background:#d4cfc7}
.card{display:flex;cursor:pointer;background:#fff;border-radius:10px;border:0.5px solid #e8e0d0;margin:8px 12px 0;transition:background .2s;animation:fadeUp .35s ease both}
.card:hover{background:#faf6ef}
.card img{width:95px;min-width:95px;height:80px;object-fit:cover;flex-shrink:0;border-radius:10px 0 0 10px}
.card-noimg{width:95px;min-width:95px;height:80px;background:#e8dfd4;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:10px 0 0 10px}
.card-body{padding:8px 11px;display:flex;flex-direction:column;justify-content:space-between;flex:1;min-width:0}
.card-cat{font-size:8px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:#C8102E;margin-bottom:4px}
.card-title{font-weight:700;font-size:13px;line-height:1.3;color:#0f0f0f;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-date{font-size:10px;color:#999;font-style:italic;margin-top:4px}
.more{text-align:center;padding:24px}
.more button{background:#0f0f0f;color:#fff;border:none;padding:12px 32px;font-family:inherit;font-size:13px;letter-spacing:1px;cursor:pointer;transition:background .2s;border-radius:4px}
.more button:hover{background:#C8102E}
.err{padding:40px 24px;text-align:center;color:#6b6560;font-size:14px;line-height:1.7}
.err h3{color:#0f0f0f;margin-bottom:12px;font-size:20px}
#reader{display:none;position:fixed;inset:0;z-index:300;background:#f5f0e8;overflow-y:auto}
#reader.open{display:block;animation:fadeUp .25s ease}
.reader-header{position:sticky;top:0;z-index:10;background:#0f0f0f;border-bottom:2px solid #C8102E;display:flex;align-items:center;gap:12px;padding:11px 16px}
.reader-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
.reader-logo{cursor:pointer}.reader-logo img{height:28px;width:auto;display:block}
.reader-body{max-width:480px;margin:0 auto}
.reader-hero{width:100%;max-height:280px;object-fit:cover;display:block}
.reader-content{padding:20px 18px 100px}
.reader-cat{display:inline-block;background:#C8102E;color:#fff;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:12px}
.reader-title{font-size:22px;font-weight:900;line-height:1.2;color:#0f0f0f;letter-spacing:-.4px;margin-bottom:10px}
.reader-meta{font-size:11px;color:#888;font-style:italic;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #d4cfc7}
.reader-text{font-size:15px;line-height:1.75;color:#2a2a2a}
.reader-text p{margin-bottom:16px}
.reader-text img{width:100%;border-radius:8px;margin:12px 0;display:block}
.reader-text h2,.reader-text h3,.reader-text h4{font-weight:700;margin:20px 0 8px;color:#0f0f0f}
.reader-text a{color:#C8102E;text-decoration:none}
.reader-open-web{display:block;margin:24px auto 0;background:#0f0f0f;color:#fff;border:none;padding:11px 28px;font-family:inherit;font-size:12px;letter-spacing:1px;cursor:pointer;border-radius:4px}
.az-footer{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#0f0f0f;border-top:2px solid #C8102E}
.az-label{text-align:center;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:#555;padding:5px 0 3px;font-weight:600}
.az-strip{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;padding:4px 12px 8px;gap:16px}
.az-strip::-webkit-scrollbar{display:none}
.az-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;cursor:pointer;opacity:.75;transition:opacity .2s}
.az-item:hover{opacity:1}
.az-item img{height:28px;width:auto;max-width:80px;object-fit:contain;filter:brightness(0) invert(1)}
.az-item span{font-size:8px;color:#666;white-space:nowrap}
.az-name{font-size:9px!important;font-weight:700;color:#aaa!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.webtv{display:none;position:fixed;inset:0;z-index:300;background:#0f0f0f;overflow-y:auto}
.webtv.open{display:block}
.webtv-hdr{position:sticky;top:0;z-index:10;background:#0f0f0f;border-bottom:2px solid #C8102E;display:flex;align-items:center;gap:12px;padding:11px 16px}
.webtv-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0}
.webtv-ttl{color:#fff;font-size:16px;font-weight:700}
.webtv-ttl span{color:#C8102E}
.live-wrap{padding:12px}
.live-lbl{color:#C8102E;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.live-lbl::before{content:'';width:8px;height:8px;border-radius:50%;background:#C8102E;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-fr{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;background:#111;display:block}
.vgrid{padding:12px;max-width:480px;margin:0 auto}
.vsec{color:#888;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:16px 0 8px;border-bottom:1px solid #222;margin-bottom:8px}
.vcard{display:flex;gap:10px;cursor:pointer;padding:10px 0;border-bottom:1px solid #1a1a1a}
.vthumb{position:relative;width:120px;min-width:120px;height:80px;border-radius:6px;overflow:hidden;background:#1a1a1a;flex-shrink:0}
.vthumb img{width:100%;height:100%;object-fit:cover;display:block}
.vplay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4)}
.vplay::after{content:'';border-left:18px solid #fff;border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:4px}
.vinfo{flex:1;min-width:0}
.vcat{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C8102E;margin-bottom:4px}
.vtitle{font-size:13px;font-weight:700;color:#fff;line-height:1.3;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.vdate{font-size:10px;color:#555;font-style:italic;margin-top:4px}
.voverlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.95);align-items:center;justify-content:center;flex-direction:column}
.voverlay.open{display:flex}
.vclose{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
.vtitle2{color:#fff;font-size:14px;font-weight:600;padding:12px 20px 8px;text-align:center;max-width:480px}
.vframe{width:100%;max-width:480px;aspect-ratio:16/9;border:none;background:#000}
</style>
</head>

<script>
var PROXY = 'https://rietilife-proxy.onrender.com';
var PAGE = 12;
var MESI = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
var GIORNI = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
var nd = new Date();
document.getElementById('hdate').textContent = GIORNI[nd.getDay()] + ' ' + nd.getDate() + ' ' + MESI[nd.getMonth()] + ' ' + nd.getFullYear();

function ago(ds) {
  if (!ds) return '';
  var d = Math.floor((Date.now() - new Date(ds)) / 60000);
  if (d < 2) return 'Ora';
  if (d < 60) return d + ' min fa';
  if (d < 1440) return Math.floor(d/60) + ' ore fa';
  var dt = new Date(ds);
  return dt.getDate() + ' ' + MESI[dt.getMonth()];
}

var allPosts = [], shown = 0, currentCat = '', catIds = {};

function proxyImg(url) {
  if (!url) return '';
  return PROXY + '/?img=' + encodeURIComponent(url);
}

function apiFetch(path) {
  return fetch(PROXY + '/?path=' + encodeURIComponent(path))
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}

function getImg(p) {
  var m = p._embedded && p._embedded['wp:featuredmedia'] && p._embedded['wp:featuredmedia'][0];
  if (!m) return '';
  var s = m.media_details && m.media_details.sizes;
  if (s) {
    if (s.medium_large) return s.medium_large.source_url;
    if (s.large) return s.large.source_url;
    if (s.medium) return s.medium.source_url;
  }
  return m.source_url || '';
}

function getCat(p) {
  var t = p._embedded && p._embedded['wp:term'] && p._embedded['wp:term'][0];
  if (!t) return '';
  var skip = ['archivio-fotografico','foto-home','apertura','apertura-1','apertura-2','apertura-3','uncategorized'];
  for (var i = 0; i < t.length; i++) {
    if (t[i].taxonomy === 'category' && skip.indexOf(t[i].slug) === -1) return t[i].name;
  }
  return '';
}

function renderPosts() {
  var feed = document.getElementById('feed');
  var old = feed.querySelector('.more');
  if (old) old.remove();
  var batch = allPosts.slice(shown, shown + PAGE);
  batch.forEach(function(post, i) {
    var gi = shown + i;
    var title = (post.title && post.title.rendered || '').replace(/<[^>]+>/g, '');
    var img = getImg(post);
    var cat = getCat(post);
    var date = post.date || '';
    var el = document.createElement('div');
    if (gi === 0) {
      el.className = 'featured';
      var inner = '';
      if (img) {
        inner += '<img src="' + proxyImg(img) + '" alt="" loading="lazy">';
      } else {
        inner += '<div style="height:260px;background:#1a1a1a"></div>';
      }
      inner += '<div class="feat-overlay">';
      if (cat) inner += '<div class="feat-cat">' + cat + '</div>';
      inner += '<div class="feat-title">' + title + '</div>';
      inner += '<div class="feat-date">' + ago(date) + '</div>';
      inner += '</div>';
      el.innerHTML = inner;
      el.onclick = (function(p) { return function() { openArticle(p); }; })(post);
      feed.appendChild(el);
      var dv = document.createElement('div');
      dv.className = 'divider';
      dv.textContent = 'Ultime notizie';
      feed.appendChild(dv);
    } else {
      el.className = 'card';
      var inner2 = '';
      if (img) {
        inner2 += '<img src="' + proxyImg(img) + '" alt="" loading="lazy">';
      } else {
        inner2 += '<div class="card-noimg">&#128240;</div>';
      }
      inner2 += '<div class="card-body">';
      if (cat) inner2 += '<div class="card-cat">' + cat + '</div>';
      inner2 += '<div class="card-title">' + title + '</div>';
      inner2 += '<div class="card-date">' + ago(date) + '</div>';
      inner2 += '</div>';
      el.innerHTML = inner2;
      el.onclick = (function(p) { return function() { openArticle(p); }; })(post);
      feed.appendChild(el);
    }
  });
  shown += batch.length;
  var m = document.createElement('div');
  m.className = 'more';
  m.innerHTML = '<button onclick="loadMore()">Carica altre notizie</button>';
  feed.appendChild(m);
}

function loadMore() {
  var old = document.getElementById('feed').querySelector('.more');
  if (old) old.remove();
  var page = Math.floor(shown / PAGE) + 2;
  var path = '/wp/v2/posts?per_page=' + PAGE + '&page=' + page + '&_embed&orderby=date&order=desc';
  if (currentCat && catIds[currentCat]) path += '&categories=' + catIds[currentCat];
  apiFetch(path).then(function(posts) {
    if (posts && posts.length) { allPosts = allPosts.concat(posts); renderPosts(); }
  }).catch(function() {});
}

function load(cat) {
  document.getElementById('feed').innerHTML = '<div class="loader"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p>Caricamento&hellip;</p><p style="font-size:11px;color:#aaa;margin-top:6px">Prima apertura: fino a 30 sec</p></div>';
  allPosts = []; shown = 0; currentCat = cat;
  function doLoad() {
    var path = '/wp/v2/posts?per_page=' + PAGE + '&_embed&orderby=date&order=desc';
    if (cat && catIds[cat]) path += '&categories=' + catIds[cat];
    apiFetch(path).then(function(posts) {
      if (!posts || !posts.length) throw new Error('Nessun articolo');
      allPosts = posts;
      document.getElementById('feed').innerHTML = '';
      renderPosts();
    }).catch(function(e) {
    }).catch(function(e) {
      document.getElementById('feed').innerHTML = '<div class="err"><h3>Errore</h3><p>' + e.message + '</p><p><button onclick="load(&quot;&quot;)" style="background:#C8102E;color:#fff;border:none;padding:10px 24px;cursor:pointer;font-size:13px;border-radius:4px;margin-top:12px">&#8635; Riprova</button></p></div>';
    });
  }
  if (cat && Object.keys(catIds).length === 0) {
    apiFetch('/wp/v2/categories?per_page=50&hide_empty=true').then(function(cats) {
      cats.forEach(function(c) { catIds[c.slug] = c.id; }); doLoad();
    }).catch(function() { doLoad(); });
  } else { doLoad(); }
}

var reader = document.getElementById('reader');
var readerBody = document.getElementById('reader-body');

function closeReader() { reader.classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('rbk').onclick = closeReader;
document.getElementById('rlogo').onclick = function() { closeReader(); window.scrollTo({top:0}); };
document.getElementById('home-logo').onclick = function() { closeReader(); window.scrollTo({top:0}); };
window.addEventListener('popstate', function() { if (reader.classList.contains('open')) closeReader(); });

function openArticle(post) {
  reader.classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({reader:true}, '', '');
  reader.scrollTo(0, 0);
  var title = (post.title && post.title.rendered || '').replace(/<[^>]+>/g, '');
  var link = post.link || '#';
  var img = getImg(post);
  var cat = getCat(post);
  var html = '';
  if (img) html += '<img class="reader-hero" src="' + proxyImg(img) + '" alt="">';
  html += '<div class="reader-content">';
  if (cat) html += '<div class="reader-cat">' + cat + '</div>';
  html += '<div class="reader-title">' + title + '</div>';
  html += '<div class="reader-meta">' + ago(post.date || '') + '</div>';
  html += '<div id="rta" style="color:#aaa;font-style:italic;font-size:14px">Caricamento testo&hellip;</div>';
  html += '<button class="reader-open-web" id="owb">&#8599; Apri articolo completo</button>';
  html += '</div>';
  readerBody.innerHTML = html;
  document.getElementById('owb').onclick = function() { window.open(link, '_blank'); };
  apiFetch('/wp/v2/posts/' + post.id + '?_embed').then(function(data) {
    var c = (data.content && data.content.rendered) || '';
    var tmp = document.createElement('div');
    tmp.innerHTML = c;
    tmp.querySelectorAll('script,iframe,style,.addtoany_share_save_container,.sharedaddy,.jp-relatedposts,figure.wp-block-embed').forEach(function(el) { el.remove(); });
    tmp.querySelectorAll('p').forEach(function(p) { if (p.textContent.indexOf('proviene da') !== -1) p.remove(); });
    tmp.querySelectorAll('img').forEach(function(img) { img.removeAttribute('width'); img.removeAttribute('height'); img.style.maxWidth='100%'; img.loading='lazy'; var src = img.getAttribute('src'); if (src) img.setAttribute('src', proxyImg(src)); });
    var area = document.getElementById('rta');
    if (area) { area.className = 'reader-text'; area.innerHTML = tmp.innerHTML || '<p>Contenuto non disponibile.</p>'; }
  }).catch(function() {
    var area = document.getElementById('rta');
    if (area) area.textContent = 'Errore nel caricamento.';
  });
}

document.querySelectorAll('.cat').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cat').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    load(btn.dataset.cat);
  });
});


// ── WEBTV ──────────────────────────────────────────────────
var webtv = document.getElementById('webtv');
var voverlay = document.getElementById('voverlay');
var vgridLoaded = false;

document.getElementById('webtv-btn').addEventListener('click', function() {
  document.querySelectorAll('.cat').forEach(function(b) { b.classList.remove('active'); });
  this.classList.add('active');
  webtv.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (!vgridLoaded) { vgridLoaded = true; loadVideos(); }
});

document.getElementById('webtv-back').addEventListener('click', function() {
  webtv.classList.remove('open');
  document.body.style.overflow = '';
  document.querySelectorAll('.cat').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.cat[data-cat=""]').classList.add('active');
});

document.getElementById('vclose').addEventListener('click', function() {
  voverlay.classList.remove('open');
  document.getElementById('vplayer').innerHTML = '<p style="color:#888">Caricamento&hellip;</p>';
});

function loadVideos() {
  var grid = document.getElementById('vgrid');
  apiFetch('/wp/v2/posts?per_page=30&_embed&orderby=date&order=desc&categories=41344,41345,41335')
    .then(function(posts) {
      // Filtra solo i post con URL /video/
      var videos = posts.filter(function(p) { return p.link && p.link.indexOf('/video/') !== -1; });
      if (!videos.length) {
        // Fallback: cerca per slug
        return apiFetch('/wp/v2/posts?per_page=50&_embed&orderby=date&order=desc&search=rietilife+tv');
      }
      return videos;
    })
    .then(function(posts) {
      if (!posts || !posts.length) {
        grid.innerHTML = '<p style="color:#555;padding:20px;text-align:center">Nessun video.</p>';
        return;
      }
      var html = '<div class="vsec">Ultimi Video</div>';
      posts.forEach(function(post) {
        if (!post.link || post.link.indexOf('/video/') === -1) return;
        var title = (post.title && post.title.rendered || '').replace(/<[^>]+>/g, '');
        var link = post.link;
        var thumb = getImg(post);
        var cat = getCat(post);
        var date = post.date || '';
        html += '<div class="vcard" onclick="openVideo(\'' + encodeURIComponent(link) + '\',\'' + encodeURIComponent(title) + '\')">';
        html += '<div class="vthumb">';
        if (thumb) html += '<img src="' + proxyImg(thumb) + '" alt="" loading="lazy">';
        html += '<div class="vplay"></div></div>';
        html += '<div class="vinfo">';
        if (cat) html += '<div class="vcat">' + cat + '</div>';
        html += '<div class="vtitle">' + title + '</div>';
        html += '<div class="vdate">' + ago(date) + '</div>';
        html += '</div></div>';
      });
      grid.innerHTML = html || '<p style="color:#555;padding:20px;text-align:center">Nessun video.</p>';
    })
    .catch(function() {
      grid.innerHTML = '<p style="color:#555;padding:20px;text-align:center">Video non disponibili.</p>';
    });
}



function openVideo(encLink, encTitle) {
  var link = decodeURIComponent(encLink);
  var title = decodeURIComponent(encTitle);
  voverlay.classList.add('open');
  document.getElementById('vtitle2').textContent = title;
  document.getElementById('vplayer').innerHTML = '<p style="color:#888;padding:20px">Caricamento&hellip;</p>';
  fetch(PROXY + '/?video=' + encodeURIComponent(link))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.youtubeId) {
        document.getElementById('vplayer').innerHTML = '<iframe class="vframe" src="https://www.youtube.com/embed/' + d.youtubeId + '?autoplay=1" frameborder="0" allowfullscreen allow="autoplay; accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>';
      } else {
        document.getElementById('vplayer').innerHTML = '<p style="color:#888;padding:20px;text-align:center">Video non disponibile.<br><a href="' + link + '" target="_blank" style="color:#C8102E">Apri sul sito</a></p>';
      }
    })
    .catch(function() {
      document.getElementById('vplayer').innerHTML = '<p style="color:#888;padding:20px;text-align:center">Errore.<br><a href="' + link + '" target="_blank" style="color:#C8102E">Apri sul sito</a></p>';
    });
}

// Proxa i logo delle aziende amiche con fallback testo automatico
window.addEventListener('load', function() {
  document.querySelectorAll('.az-strip img[data-src]').forEach(function(img) {
    var src = img.getAttribute('data-src');
    var name = img.getAttribute('data-name') || '';
    function replaceWithText(el) {
      var span = document.createElement('span');
      span.className = 'az-name';
      span.textContent = name;
      if (el.parentNode) el.parentNode.replaceChild(span, el);
    }
    img.onerror = function() { replaceWithText(this); };
    img.onload = function() {
      // Se l'immagine e' troppo piccola o non ha dimensioni reali e' corrotta
      if (this.naturalWidth < 5 || this.naturalHeight < 5) {
        replaceWithText(this);
      }
    };
    if (src) img.setAttribute('src', proxyImg(src));
  });
});
